<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Klipy GIF Search - Front Sidebar</title>
  <script src="https://dl.frontapp.com/libs/plugin-sdk-1.8.1.min.js"></script>
  <style>
    :root { --bg: #ffffff; --text: #333; }
    @media (prefers-color-scheme: dark) { :root { --bg: #1e1e1e; --text: #f0f0f0; } }
    body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; }
    .gif-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 10px; }
    .gif-item { width: 100%; height: 120px; object-fit: cover; cursor: pointer; border-radius: 4px; }
  </style>
</head>
<body>
  <input type="text" id="search-input" placeholder="Search GIFs..." style="width: 70%;">
  <button id="search-btn">Search</button>
  <div class="gif-grid" id="gif-results"></div>

  <script>
    const klipyApiKey = "YXxLGyFs86hGcanamfKx7dFwR4WKuE2YrBQUNQGsqTmi36v4cKZR5BlHgjbo7TZz";
    
    document.getElementById('search-btn').addEventListener('click', async () => {
      const query = document.getElementById('search-input').value;
      const grid = document.getElementById('gif-results');
      grid.innerHTML = 'Searching...';

      try {
        // Added mode: 'cors' to handle the cross-origin request explicitly
        const response = await fetch(`https://api.klipy.com/api/v1/${klipyApiKey}/gifs/search?q=${encodeURIComponent(query)}&per_page=20`, {
            method: 'GET',
            mode: 'cors', 
            headers: { 'Accept': 'application/json' }
        });

        const data = await response.json();
        grid.innerHTML = '';
        
        (data.data || data.results || []).forEach(gif => {
          const url = gif.files?.original?.url || gif.src || gif.url;
          if (url) {
            const img = document.createElement('img');
            img.src = url;
            img.className = 'gif-item';
            img.onclick = () => { if(typeof Front !== 'undefined') Front.insertHTML(`<img src="${url}" />`); };
            grid.appendChild(img);
          }
        });
      } catch (e) {
        grid.innerHTML = 'Error: Check Console.';
        console.error("Fetch failed:", e);
      }
    });
  </script>
</body>
</html>
