<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>GIF Composer v1.2.1</title>
<script type="text/javascript" src="https://dl.frontapp.com/libs/plugin-sdk-1.8.1.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; font-size: 12px; background: #fff; padding: 5px; }
.search-box { display: flex; gap: 4px; margin-bottom: 5px; }
input { flex: 1; padding: 4px; border: 1px solid #ccc; border-radius: 4px; }
button { padding: 4px 8px; cursor: pointer; }
.gif-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
.gif-item { aspect-ratio: 1; overflow: hidden; border-radius: 4px; cursor: pointer; background: #eee; }
.gif-item img { width: 100%; height: 100%; object-fit: cover; }
</style>
</head>
<body>
  <div class="search-box">
    <input id="query" type="text" placeholder="Search..." />
    <button onclick="doSearch()">Go</button>
  </div>
  <div id="grid" class="gif-grid"></div>

<script>
const API_KEY = 'YXxLGyFs86hGcanamfKx7dFwR4WKuE2YrBQUNQGsqTmi36v4cKZR5BlHgjbo7TZz';

async function doSearch() {
  const q = document.getElementById('query').value.trim();
  const res = await fetch(`https://api.klipy.com/api/v1/${API_KEY}/gifs/search?q=${encodeURIComponent(q)}&per_page=12&page=1`);
  const data = await res.json();
  render(data?.data?.data || []);
}

function render(items) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  items.forEach(item => {
    const thumb = item.file?.sm?.gif?.url;
    const full = item.file?.md?.gif?.url;
    const div = document.createElement('div');
    div.className = 'gif-item';
    const img = document.createElement('img');
    img.src = thumb;

    div.onclick = async () => {
      // 1. Fetch as blob
      const response = await fetch(full);
      const blob = await response.blob();
      
      // 2. Convert to Base64
      const reader = new FileReader();
      reader.readAsDataURL(blob);
      reader.onloadend = () => {
        const base64data = reader.result;
        
        // 3. Inject natively via SDK
        // Since it's a data URI, Front's sanitizer treats it as "local"
        if (typeof Front !== 'undefined') {
          Front.insertHTML(`<img src="${base64data}" alt="GIF" />`);
        }
      };
    };

    div.appendChild(img);
    grid.appendChild(div);
  });
}
</script>
</body>
</html>
