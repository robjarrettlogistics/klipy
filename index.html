<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GIF Picker</title>
<script src="https://dl.frontapp.com/libs/frontjs.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #222; }
#app { padding: 12px; }
.tab-row { display: flex; gap: 5px; margin-bottom: 10px; }
.tab { flex: 1; padding: 5px 0; border-radius: 6px; border: 1px solid #ddd; background: transparent; cursor: pointer; font-size: 12px; color: #666; }
.tab.active { background: #e8f0fe; color: #1a73e8; border-color: #1a73e8; }
.search-row { display: flex; gap: 6px; margin-bottom: 10px; }
.search-row input { flex: 1; padding: 6px 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
.search-row button { padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: pointer; font-size: 12px; color: #444; }
.search-row button:hover { background: #f5f5f5; }
.gif-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 5px; }
.gif-item { border-radius: 6px; overflow: hidden; background: #f0f0f0; aspect-ratio: 1; cursor: pointer; position: relative; }
.gif-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
.gif-item:hover::after { content: 'Insert'; position: absolute; inset: 0; background: rgba(0,0,0,0.45); color: #fff; font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; }
.gif-item:hover::after { display: flex; }
.status { font-size: 12px; color: #999; text-align: center; padding: 20px 0; }
.toast { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; font-size: 12px; padding: 6px 14px; border-radius: 6px; display: none; }
.load-more { display: block; width: 100%; margin-top: 10px; padding: 7px; border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: pointer; font-size: 12px; color: #444; }
.attribution { font-size: 10px; color: #bbb; text-align: right; margin-top: 8px; }
</style>
</head>
<body>
<div id="app">
  <div class="tab-row">
    <button class="tab active" data-tab="gifs">GIFs</button>
    <button class="tab" data-tab="stickers">Stickers</button>
    <button class="tab" data-tab="memes">Memes</button>
  </div>
  <div class="search-row">
    <input id="query" type="text" placeholder="Search KLIPY" />
    <button onclick="doSearch()">Search</button>
    <button onclick="doTrending()">Trending</button>
  </div>
  <div id="grid" class="gif-grid"></div>
  <div id="status" class="status">Loading trending...</div>
  <button id="loadMore" class="load-more" style="display:none" onclick="loadMore()">Load more</button>
  <div class="attribution">Powered by KLIPY</div>
</div>
<div id="toast" class="toast"></div>

<script>
const API_KEY = 'YXxLGyFs86hGcanamfKx7dFwR4WKuE2YrBQUNQGsqTmi36v4cKZR5BlHgjbo7TZz';
let currentTab = 'gifs';
let currentPage = 1;
let currentQuery = '';
let isTrending = false;

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    currentTab = t.dataset.tab;
    currentPage = 1;
    document.getElementById('grid').innerHTML = '';
    document.getElementById('loadMore').style.display = 'none';
    if (isTrending) doTrending(); else if (currentQuery) doSearch(true);
  });
});

document.getElementById('query').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

async function fetchItems(url) {
  setStatus('Loading...');
  try {
    const res = await fetch(url);
    if (!res.ok) { setStatus('API error ' + res.status + '.'); return null; }
    return await res.json();
  } catch(e) {
    setStatus('Request failed.');
    return null;
  }
}

async function doSearch(silent) {
  const q = silent ? currentQuery : document.getElementById('query').value.trim();
  if (!q) { setStatus('Enter a search term.'); return; }
  currentQuery = q;
  isTrending = false;
  currentPage = 1;
  document.getElementById('grid').innerHTML = '';
  const data = await fetchItems('https://api.klipy.com/api/v1/' + API_KEY + '/' + currentTab + '/search?q=' + encodeURIComponent(q) + '&per_page=24&page=1');
  if (data) renderItems(data, true);
}

async function doTrending() {
  isTrending = true;
  currentQuery = '';
  currentPage = 1;
  document.getElementById('grid').innerHTML = '';
  const data = await fetchItems('https://api.klipy.com/api/v1/' + API_KEY + '/' + currentTab + '/trending?per_page=24&page=1');
  if (data) renderItems(data, true);
}

async function loadMore() {
  currentPage++;
  const url = isTrending
    ? 'https://api.klipy.com/api/v1/' + API_KEY + '/' + currentTab + '/trending?per_page=24&page=' + currentPage
    : 'https://api.klipy.com/api/v1/' + API_KEY + '/' + currentTab + '/search?q=' + encodeURIComponent(currentQuery) + '&per_page=24&page=' + currentPage;
  const data = await fetchItems(url);
  if (data) renderItems(data, false);
}

function insertGif(url, title) {
  const html = '<img src="' + url + '" alt="' + (title || 'GIF') + '" style="max-width:100%;" />';
  if (typeof Front !== 'undefined') {
    Front.insertHTML(html);
    showToast('Inserted!');
  } else {
    showToast('Front SDK not available — open this in Front.');
  }
}

function renderItems(data, replace) {
  const grid = document.getElementById('grid');
  const items = (data && data.data && data.data.data) ? data.data.data : [];
  if (replace) grid.innerHTML = '';
  if (items.length === 0) { setStatus('No results found.'); document.getElementById('loadMore').style.display = 'none'; return; }
  setStatus('');
  items.forEach(function(item) {
    const file = item.file || {};
    const thumb = (file.sm && file.sm.gif && file.sm.gif.url) || (file.xs && file.xs.gif && file.xs.gif.url) || (file.md && file.md.gif && file.md.gif.url) || '';
    const full  = (file.md && file.md.gif && file.md.gif.url) || (file.hd && file.hd.gif && file.hd.gif.url) || thumb;
    if (!thumb) return;
    const div = document.createElement('div');
    div.className = 'gif-item';
    const img = document.createElement('img');
    img.src = thumb;
    img.alt = item.title || '';
    img.loading = 'lazy';
    div.appendChild(img);
    div.addEventListener('click', function() { insertGif(full, item.title); });
    grid.appendChild(div);
  });
  document.getElementById('loadMore').style.display = (data.data && data.data.has_next) ? 'block' : 'none';
}

function setStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  s.style.display = msg ? 'block' : 'none';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(function() { t.style.display = 'none'; }, 1800);
}

doTrending();
</script>
</body>
</html>
