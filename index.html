<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>GIF Picker v1.1.0</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #222; }
@media (prefers-color-scheme: dark) {
  body { background: #1e1e1e; color: #f0f0f0; }
  .gif-item { background: #2d2d2d; }
}
#app { padding: 12px; }
.gif-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 5px; }
.gif-item { border-radius: 6px; overflow: hidden; background: #f0f0f0; aspect-ratio: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.gif-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
.context-status { font-size: 11px; padding: 4px 8px; border-radius: 4px; margin-bottom: 8px; text-align: center; background: #e6f4ea; color: #1e8e3e; }
.version { font-size: 10px; color: #aaa; text-align: center; margin-top: 15px; }
</style>
</head>
<body>
<div id="app">
  <div id="contextStatus" class="context-status">Click a GIF to download, then drag into Front</div>
  <div id="grid" class="gif-grid"></div>
  <div class="version">v1.1.0</div>
</div>

<script>
const API_KEY = 'YXxLGyFs86hGcanamfKx7dFwR4WKuE2YrBQUNQGsqTmi36v4cKZR5BlHgjbo7TZz';
const statusEl = document.getElementById('contextStatus');

async function doSearch() {
  const url = `https://api.klipy.com/api/v1/${API_KEY}/gifs/search?q=funny&per_page=24&page=1`;
  const res = await fetch(url);
  const data = await res.json();
  renderItems(data);
}

function renderItems(data) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const items = data?.data?.data || [];
  
  items.forEach(item => {
    const thumb = item.file?.sm?.gif?.url;
    const full = item.file?.md?.gif?.url;
    const div = document.createElement('div');
    div.className = 'gif-item';
    div.innerHTML = `<img src="${thumb}" />`;
    
    div.onclick = async () => {
      statusEl.textContent = 'Downloading...';
      const response = await fetch(full);
      const blob = await response.blob();
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'gif-picker-image.gif';
      document.body.appendChild(a);
      a.click();
      a.remove();
      statusEl.textContent = 'Downloaded! Now drag it into your comment';
    };
    grid.appendChild(div);
  });
}
doSearch();
</script>
</body>
</html>
