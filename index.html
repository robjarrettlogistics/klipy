<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>GIF Composer v1.2.0</title>
<script type="text/javascript" src="https://dl.frontapp.com/libs/plugin-sdk-1.8.1.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; font-size: 12px; background: #fff; padding: 5px; }
.search-box { display: flex; gap: 4px; margin-bottom: 5px; }
input { flex: 1; padding: 4px; border: 1px solid #ccc; border-radius: 4px; }
button { padding: 4px 8px; cursor: pointer; }
.gif-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
.gif-item { aspect-ratio: 1; overflow: hidden; border-radius: 4px; cursor: grab; background: #eee; }
.gif-item img { width: 100%; height: 100%; object-fit: cover; }
</style>
</head>
<body>
  <div class="search-box">
    <input id="query" type="text" placeholder="Search..." />
    <button onclick="doSearch()">Go</button>
  </div>
  <div id="grid" class="gif-grid"></div>

<script>
const API_KEY = 'YXxLGyFs86hGcanamfKx7dFwR4WKuE2YrBQUNQGsqTmi36v4cKZR5BlHgjbo7TZz';

async function doSearch() {
  const q = document.getElementById('query').value.trim();
  const res = await fetch(`https://api.klipy.com/api/v1/${API_KEY}/gifs/search?q=${encodeURIComponent(q)}&per_page=12&page=1`);
  const data = await res.json();
  render(data?.data?.data || []);
}

function render(items) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  items.forEach(item => {
    const thumb = item.file?.sm?.gif?.url;
    const full = item.file?.md?.gif?.url;
    const div = document.createElement('div');
    div.className = 'gif-item';
    const img = document.createElement('img');
    img.src = thumb;
    img.draggable = true;

    // Use native Drag API - Front's composer handles this perfectly
    img.addEventListener('dragstart', async (e) => {
      const response = await fetch(full);
      const blob = await response.blob();
      const file = new File([blob], "image.gif", { type: "image/gif" });
      
      // We pass the dataTransfer so Front recognizes this as a file upload
      e.dataTransfer.setData('DownloadURL', `image/gif:image.gif:${full}`);
      // Fallback for some browsers
      const dataTransfer = new DataTransfer();
      dataTransfer.items.add(file);
      e.dataTransfer.setData("application/x-moz-file", file);
    });

    div.appendChild(img);
    grid.appendChild(div);
  });
}
</script>
</body>
</html>
