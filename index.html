<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Klipy GIF Search - Front Sidebar</title>
  <!-- Include Front's Plugin SDK Script -->
  <script src="https://dl.frontapp.com/libs/frontjs.development.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 10px;
      background-color: #ffffff;
      color: #333;
    }
    .search-container {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    input[type="text"] {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #dcdcdc;
      border-radius: 4px;
      font-size: 14px;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #4a90e2;
    }
    button {
      background-color: #4a90e2;
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
    }
    button:hover {
      background-color: #357abd;
    }
    .gif-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .gif-item {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 4px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s ease;
    }
    .gif-item:hover {
      border-color: #4a90e2;
    }
    .status-msg {
      font-size: 12px;
      color: #666;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="search-container">
    <input type="text" id="search-input" placeholder="Search Klipy GIFs..." />
    <button id="search-btn">Search</button>
  </div>

  <div class="gif-grid" id="gif-results">
    <!-- GIFs will be injected here dynamically -->
  </div>

  <div id="status" class="status-msg">Loading plugin configuration...</div>

  <script>
    // Extract the API key securely from the URL parameter (?key=YOUR_KEY)
    const urlParams = new URLSearchParams(window.location.search);
    const klipyApiKey = urlParams.get('key');

    // Initialize Front SDK
    Front.on('config', (context) => {
      if (!klipyApiKey) {
        updateStatus("Error: 'key' query parameter is missing from the sidebar URL setup in Front.");
      } else {
        updateStatus("Connected to Front. Ready to search.");
      }
    });

    // Handle Search Action
    document.getElementById('search-btn').addEventListener('click', performSearch);
    document.getElementById('search-input').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') performSearch();
    });

    async function performSearch() {
      if (!klipyApiKey) {
        updateStatus("Cannot search: Klipy API Key is missing from the URL.");
        return;
      }

      const query = document.getElementById('search-input').value.trim();
      if (!query) return;

      const grid = document.getElementById('gif-results');
      grid.innerHTML = '<div style="grid-column: span 2; text-align:center; padding:20px;">Searching...</div>';

      try {
        const url = `https://api.klipy.com/api/v1/${klipyApiKey}/gifs/search?q=${encodeURIComponent(query)}&per_page=20`;
        const response = await fetch(url);
        const data = await response.json();

        grid.innerHTML = ''; // Clear loading state

        const gifs = data.data || data.results || [];

        if (gifs.length === 0) {
          grid.innerHTML = '<div style="grid-column: span 2; text-align:center; padding:20px;">No GIFs found.</div>';
          return;
        }

        gifs.forEach(gif => {
          const gifUrl = gif.files?.original?.url || gif.src || gif.url;
          
          if (gifUrl) {
            const img = document.createElement('img');
            img.src = gifUrl;
            img.className = 'gif-item';
            img.alt = gif.title || 'Klipy GIF';
            img.addEventListener('click', () => insertGifIntoFront(gifUrl));
            grid.appendChild(img);
          }
        });

      } catch (error) {
        console.error('Error fetching from Klipy:', error);
        grid.innerHTML = '<div style="grid-column: span 2; color:red; text-align:center; padding:20px;">Error loading GIFs.</div>';
      }
    }

    // Insert Image Tag into Front Canvas
    function insertGifIntoFront(url) {
      const htmlToInsert = `<img src="${url}" alt="GIF" style="max-width: 100%; height: auto;" />`;

      Front.getSidebarContext().then((context) => {
        if (context.hasDraft) {
          context.insertHtml(htmlToInsert);
          updateStatus("Inserted into email draft!");
        } else {
          Front.comment({
            html: htmlToInsert
          });
          updateStatus("Inserted into comment box!");
        }
      }).catch((err) => {
        console.error("SDK Error:", err);
        updateStatus("Failed to insert. Make sure a conversation is open.");
      });
    }

    function updateStatus(msg) {
      document.getElementById('status').innerText = msg;
    }
  </script>
</body>
</html>
